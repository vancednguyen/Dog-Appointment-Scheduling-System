<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Provider Register</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="page-box">
    <h1>Create Provider Account</h1>

    <p th:if="${error}" th:text="${error}" style="color:red;"></p>

    <form action="/provider/register" method="post" class="form-box">
        <input type="text" name="firstName" placeholder="First Name" required>
        <input type="text" name="lastName" placeholder="Last Name" required>
        <input type="text" name="phoneNumber" placeholder="Phone Number">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <input type="text" name="address" placeholder="Address">
        <input type="text" name="name" placeholder="Business Name" required>
        <button type="submit">Create Account</button>
    </form>

    <p>Already have an account? <a href="/provider/login">Provider Login</a></p>
</div>
</body>
</html>
