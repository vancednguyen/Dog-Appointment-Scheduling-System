<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Availability</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="page-box wider-box">
    <h1>Create Availability</h1>

    <p th:if="${error}" th:text="${error}" style="color:red;"></p>

    <form action="/provider/availability/add" method="post" class="form-box">
        <select name="serviceId" required>
            <option value="">Choose Service</option>
            <option th:each="service : ${services}"
                    th:value="${service.serviceId}"
                    th:text="${service.serviceName}">
            </option>
        </select>

        <input type="date" name="slotDate" required>
        <input type="time" name="startTime" required>
        <input type="time" name="endTime" required>

        <button type="submit">Add Availability Slot</button>
    </form>

    <div class="service-list">
        <h2>My Availability Slots</h2>
        <table class="service-table">
            <thead>
            <tr>
                <th>Date</th>
                <th>Start</th>
                <th>End</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="slot : ${slots}">
                <td th:text="${slot.slotDate}"></td>
                <td th:text="${slot.startTime}"></td>
                <td th:text="${slot.endTime}"></td>
                <td th:text="${slot.status}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
